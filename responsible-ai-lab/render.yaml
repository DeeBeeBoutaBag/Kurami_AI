services:
  - type: web
    name: responsible-ai-lab-server
    runtime: node
    plan: free
    rootDir: responsible-ai-lab
    buildCommand: npm ci --include=dev && npm run db:generate && npm run build -w @responsible-ai-lab/shared && npm run build -w @responsible-ai-lab/server
    startCommand: npm run db:migrate && npm run db:seed && npm run start -w @responsible-ai-lab/server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEMO_MODE
        value: false
      - key: PORT
        value: 10000
      - key: APP_URL
        value: https://responsible-ai-lab-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: responsible-ai-lab-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: responsible-ai-lab-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: FACILITATOR_PIN
        sync: false
      - key: GOLD_FACILITATOR_PIN
        sync: false
      - key: BLACK_FACILITATOR_PIN
        sync: false
      - key: GREEN_FACILITATOR_PIN
        sync: false
      - key: PURPLE_FACILITATOR_PIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: EVENT_CODE
        value: ETHICS2026

  - type: web
    name: responsible-ai-lab-web
    runtime: static
    rootDir: responsible-ai-lab
    buildCommand: npm ci --include=dev && npm run build -w @responsible-ai-lab/shared && npm run build -w @responsible-ai-lab/ui && npm run build -w @responsible-ai-lab/web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://responsible-ai-lab-server.onrender.com

  - type: keyvalue
    name: responsible-ai-lab-redis
    plan: free
    ipAllowList: []

databases:
  - name: responsible-ai-lab-db
    plan: free
